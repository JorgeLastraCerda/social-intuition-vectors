model:
  # Local dev (RTX 4050m, 6 GB VRAM): Qwen2.5-1.5B fits in ~3 GB bf16.
  # SCCKN production: switch to "Qwen/Qwen2.5-7B-Instruct" (needs ~14 GB VRAM).
  # M4 Mac: do NOT use — MPS gives wrong results (transformer-lens issue #1178)
  #         and CPU OOMs on 16 GB even for 1.5B.
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  dtype: "bfloat16"
  device: "cuda"

generation:
  model: "claude-haiku-4-5-20251001"
  max_tokens: 300
  temperature: 1.0
  max_retries: 5
  requests_per_minute: 50

probing:
  probe_layer_frac: 0.66
  n_topics: 100
  stories_per_topic: 12
  start_token: 50
  seed: 20260527

steering:
  strengths: [0.0, 0.25, 0.5, 1.0]

paths:
  papers: "papers/"
  raw_data: "data/raw/"
  stimuli: "data/stimuli/"
  processed: "data/processed/"
  results: "results/"
  logs: "results/logs/"
