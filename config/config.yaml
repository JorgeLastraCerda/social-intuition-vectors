model:
  # Committed model for the core result: google/gemma-3-12b-it (smoke tests)
  # Scale-up target: google/gemma-3-27b-it on scc214 (RTX 6000, 96 GB VRAM)
  # SCCKN smoke tests run on L40 48 GB nodes (scc213 / scc192); 12B needs ~24 GB bf16.
  # Gemma 4 12B (google/gemma-4-12B-it) runs in the wc-nn environment via nnsight.
  name: "google/gemma-3-12b-it"
  dtype: "bfloat16"
  device: "cuda"

generation:
  model: "claude-haiku-4-5-20251001"
  max_tokens: 300
  temperature: 1.0
  max_retries: 5
  requests_per_minute: 50

probing:
  probe_layer_frac: 0.66
  n_topics: 100
  stories_per_topic: 12
  start_token: 50
  seed: 20260527

steering:
  strengths: [0.0, 0.25, 0.5, 1.0]

paths:
  papers: "literature/"
  raw_data: "data/raw/"
  stimuli: "data/stimuli/"
  processed: "data/processed/"
  results: "results/"
  logs: "results/logs/"

neutral:
  # Neutral corpus for PCA valence-denoising (Wikipedia intros, length-matched).
  corpus_path: "data/stimuli/neutral_corpus.jsonl"
  source_dataset: "wikimedia/wikipedia"
  source_config: "20231101.en"
  n_texts: 1500
  min_words: 90
  max_words: 200
  variance_threshold: 0.50      # keep top PCs covering >= 50% of neutral variance
