model:
  name: "REPLACE_ME"
  dtype: "bfloat16"
  device: "cuda"

generation:
  model: "claude-haiku-4-5-20251001"
  max_tokens: 300
  temperature: 1.0
  max_retries: 5
  requests_per_minute: 50

probing:
  probe_layer_frac: 0.66
  n_topics: 100
  stories_per_topic: 12
  start_token: 50
  seed: 20260527

steering:
  strengths: [0.0, 0.25, 0.5, 1.0]

paths:
  papers: "papers/"
  raw_data: "data/raw/"
  stimuli: "data/stimuli/"
  processed: "data/processed/"
  results: "results/"
  logs: "results/logs/"
